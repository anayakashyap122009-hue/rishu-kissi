<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiss for Lakshita</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:'Segoe UI',sans-serif;
overflow:hidden;
text-align:center;

background:linear-gradient(135deg,#ff5fa2,#ff7ac3,#ff9ed8);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

/* BIG KISS */
.kiss{
position:absolute;
top:-200px;
font-size:70vw;
animation:kissDrop 2s forwards;
}

@keyframes kissDrop{
0%{
top:-200px;
transform:rotate(-20deg) scale(0.5);
}
70%{
top:40%;
transform:rotate(10deg) scale(1.1);
}
100%{
top:50%;
transform:translateY(-50%) scale(1);
}
}

/* LOVE TEXT */
.loveText{
position:absolute;
top:18%;
font-size:3rem;
color:white;
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;
width:0;
animation:typing 3s steps(25,end) forwards;
animation-delay:2s;
}

@keyframes typing{
from{width:0}
to{width:520px}
}

/* MESSAGE */
.message{
position:absolute;
bottom:80px;
font-size:2rem;
color:white;
opacity:0;
animation:showText 2s forwards;
animation-delay:4s;
text-shadow:0 0 10px white;
}

@keyframes showText{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* HEART RAIN */
.heart{
position:absolute;
font-size:22px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="kiss">💋</div>

<div class="loveText">
Rishabh ❤️ Lakshita
</div>

<div class="message">
A sweet kiss from Rishabh to Lakshita 💋 <br>
my betuu, my forever safe place 💖
</div>

<script>

/* HEART RAIN EFFECT */
for(let i=0;i<40;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💗";

heart.style.left=Math.random()*100+"%";
heart.style.animationDuration=(4+Math.random()*4)+"s";
heart.style.fontSize=(15+Math.random()*20)+"px";

document.body.appendChild(heart);

}

</script>

</body>
</html>
